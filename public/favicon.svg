<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0f0f0f"/>

  <!-- Chef hat dome (puffed top) -->
  <ellipse cx="256" cy="195" rx="112" ry="100" fill="#FF6B35"/>

  <!-- Chef hat band -->
  <rect x="148" y="270" width="216" height="52" rx="10" fill="#FF6B35"/>

  <!-- Hat highlight (sheen) -->
  <ellipse cx="222" cy="165" rx="38" ry="28" fill="rgba(255,255,255,0.18)" transform="rotate(-20 222 165)"/>

  <!-- Divider line between dome and band -->
  <rect x="148" y="268" width="216" height="4" rx="2" fill="rgba(0,0,0,0.25)"/>

  <!-- "cheff" text -->
  <text
    x="256" y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="108"
    letter-spacing="-3"
    fill="#ffffff"
    text-anchor="middle"
  >cheff</text>
</svg>
